version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Europe/Oslo"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 20
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25"
    groups:
      aksel:
        patterns:
          - "@navikt/aksel-icons"
          - "@navikt/ds-*"
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tooling:
        patterns:
          - "@eslint/js"
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-jsx-a11y"
          - "eslint-plugin-react"
          - "typescript-eslint"
          - "prettier"
          - "prettier-plugin-astro"
          - "lint-staged"
          - "husky"
      patch-updates:
        update-types:
          - patch
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
